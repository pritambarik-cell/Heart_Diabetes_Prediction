<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Prediction System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px 0;
        }

        .card {
            border: none;
            border-radius: 15px;
            transition: transform 0.3s ease;
            margin-bottom: 20px;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .btn {
            border-radius: 25px;
            padding: 12px 30px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        .display-4 {
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            color: white;
        }

        .lead {
            color: #e9ecef;
            font-weight: 400;
        }

        .form-control {
            border-radius: 10px;
            border: 2px solid #e9ecef;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }

        .result-box {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
            border-left: 5px solid #28a745;
        }

        .risk-high {
            border-left-color: #dc3545 !important;
        }

        .risk-medium {
            border-left-color: #ffc107 !important;
        }

        .risk-low {
            border-left-color: #28a745 !important;
        }

        .container {
            max-width: 1200px;
        }

        .card-title {
            font-weight: 600;
            margin-bottom: 15px;
        }

        .card-text {
            color: #6c757d;
            margin-bottom: 20px;
        }

        .form-label {
            font-weight: 500;
            margin-bottom: 8px;
        }

        .alert {
            border-radius: 10px;
        }

        .badge {
            font-size: 0.9em;
            padding: 8px 12px;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <div class="row">
            <div class="col-md-12 text-center">
                <h1 class="display-4">🏥 Medical Prediction System</h1>
                <p class="lead">AI-powered health risk assessment</p>
                <hr class="my-4" style="border-color: rgba(255,255,255,0.3);">
            </div>
        </div>

        <div class="row mt-5">
            <!-- Diabetes Prediction Card -->
            <div class="col-md-6 mb-4">
                <div class="card h-100 shadow">
                    <div class="card-body text-center">
                        <h3 class="card-title text-success">🩺 Diabetes Predictor</h3>
                        <p class="card-text">Predict the likelihood of diabetes based on health parameters</p>
                        <div class="mt-4">
                            <button class="btn btn-success btn-lg" onclick="showDiabetesForm()">
                                Check Diabetes Risk
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Heart Disease Prediction Card -->
            <div class="col-md-6 mb-4">
                <div class="card h-100 shadow">
                    <div class="card-body text-center">
                        <h3 class="card-title text-danger">❤️ Heart Disease Predictor</h3>
                        <p class="card-text">Assess your risk of heart disease using medical indicators</p>
                        <div class="mt-4">
                            <button class="btn btn-danger btn-lg" onclick="showHeartForm()">
                                Check Heart Health
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Diabetes Prediction Form -->
        <div id="diabetesForm" class="card mt-4 d-none">
            <div class="card-header bg-success text-white">
                <h4>Diabetes Risk Assessment</h4>
            </div>
            <div class="card-body">
                <form id="diabetesPredictionForm">
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Pregnancies</label>
                            <input type="number" class="form-control" name="pregnancies" min="0" max="20" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Glucose Level (mg/dL)</label>
                            <input type="number" class="form-control" name="glucose" min="0" max="200" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Blood Pressure (mm Hg)</label>
                            <input type="number" class="form-control" name="blood_pressure" min="0" max="122" required>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Skin Thickness (mm)</label>
                            <input type="number" class="form-control" name="skin_thickness" min="0" max="100" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Insulin Level (mu U/ml)</label>
                            <input type="number" class="form-control" name="insulin" min="0" max="846" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">BMI</label>
                            <input type="number" step="0.1" class="form-control" name="bmi" min="0" max="67.1" required>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Diabetes Pedigree Function</label>
                            <input type="number" step="0.001" class="form-control" name="dpf" min="0" max="2.42" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Age</label>
                            <input type="number" class="form-control" name="age" min="21" max="81" required>
                        </div>
                    </div>
                    <div class="text-center">
                        <button type="submit" class="btn btn-success">Predict Diabetes Risk</button>
                        <button type="button" class="btn btn-secondary" onclick="hideForms()">Cancel</button>
                    </div>
                </form>
                <div id="diabetesResult" class="mt-3"></div>
            </div>
        </div>

        <!-- Heart Disease Prediction Form -->
        <div id="heartForm" class="card mt-4 d-none">
            <div class="card-header bg-danger text-white">
                <h4>Heart Disease Risk Assessment</h4>
            </div>
            <div class="card-body">
                <form id="heartPredictionForm">
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Age</label>
                            <input type="number" class="form-control" name="age" min="29" max="77" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Sex</label>
                            <select class="form-control" name="sex" required>
                                <option value="">Select Gender</option>
                                <option value="1">Male</option>
                                <option value="0">Female</option>
                            </select>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Chest Pain Type</label>
                            <select class="form-control" name="cp" required>
                                <option value="">Select Type</option>
                                <option value="0">Typical Angina</option>
                                <option value="1">Atypical Angina</option>
                                <option value="2">Non-anginal Pain</option>
                                <option value="3">Asymptomatic</option>
                            </select>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Resting BP (mm Hg)</label>
                            <input type="number" class="form-control" name="trestbps" min="94" max="200" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Cholesterol (mg/dL)</label>
                            <input type="number" class="form-control" name="chol" min="126" max="564" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Fasting Blood Sugar</label>
                            <select class="form-control" name="fbs" required>
                                <option value="">Select</option>
                                <option value="0">≤ 120 mg/dl</option>
                                <option value="1">> 120 mg/dl</option>
                            </select>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Resting ECG</label>
                            <select class="form-control" name="restecg" required>
                                <option value="">Select</option>
                                <option value="0">Normal</option>
                                <option value="1">ST-T Wave Abnormality</option>
                                <option value="2">Left Ventricular Hypertrophy</option>
                            </select>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Max Heart Rate</label>
                            <input type="number" class="form-control" name="thalach" min="71" max="202" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Exercise Induced Angina</label>
                            <select class="form-control" name="exang" required>
                                <option value="">Select</option>
                                <option value="0">No</option>
                                <option value="1">Yes</option>
                            </select>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label">ST Depression</label>
                            <input type="number" step="0.1" class="form-control" name="oldpeak" min="0" max="6.2" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Slope of Peak Exercise</label>
                            <select class="form-control" name="slope" required>
                                <option value="">Select</option>
                                <option value="0">Upsloping</option>
                                <option value="1">Flat</option>
                                <option value="2">Downsloping</option>
                            </select>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Number of Major Vessels</label>
                            <input type="number" class="form-control" name="ca" min="0" max="3" required>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-12 mb-3">
                            <label class="form-label">Thalassemia</label>
                            <select class="form-control" name="thal" required>
                                <option value="">Select</option>
                                <option value="1">Normal</option>
                                <option value="2">Fixed Defect</option>
                                <option value="3">Reversible Defect</option>
                            </select>
                        </div>
                    </div>
                    <div class="text-center">
                        <button type="submit" class="btn btn-danger">Predict Heart Disease Risk</button>
                        <button type="button" class="btn btn-secondary" onclick="hideForms()">Cancel</button>
                    </div>
                </form>
                <div id="heartResult" class="mt-3"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function showDiabetesForm() {
            document.getElementById('diabetesForm').classList.remove('d-none');
            document.getElementById('heartForm').classList.add('d-none');
            // Clear previous results
            document.getElementById('diabetesResult').innerHTML = '';
            document.getElementById('heartResult').innerHTML = '';
        }

        function showHeartForm() {
            document.getElementById('heartForm').classList.remove('d-none');
            document.getElementById('diabetesForm').classList.add('d-none');
            // Clear previous results
            document.getElementById('diabetesResult').innerHTML = '';
            document.getElementById('heartResult').innerHTML = '';
        }

        function hideForms() {
            document.getElementById('diabetesForm').classList.add('d-none');
            document.getElementById('heartForm').classList.add('d-none');
            document.getElementById('diabetesResult').innerHTML = '';
            document.getElementById('heartResult').innerHTML = '';
        }

        // Diabetes Form Submission
        document.getElementById('diabetesPredictionForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const formData = new FormData(this);
            const data = Object.fromEntries(formData);

            // Show loading state
            document.getElementById('diabetesResult').innerHTML = `
                <div class="alert alert-info text-center">
                    <div class="spinner-border spinner-border-sm me-2" role="status"></div>
                    Analyzing diabetes risk...
                </div>
            `;

            fetch('/predict_diabetes', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(data)
            })
            .then(response => response.json())
            .then(result => {
                displayDiabetesResult(result);
            })
            .catch(error => {
                console.error('Error:', error);
                document.getElementById('diabetesResult').innerHTML = `
                    <div class="alert alert-danger">
                        Error making prediction. Please try again.
                    </div>
                `;
            });
        });

        // Heart Form Submission
        document.getElementById('heartPredictionForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const formData = new FormData(this);
            const data = Object.fromEntries(formData);

            // Show loading state
            document.getElementById('heartResult').innerHTML = `
                <div class="alert alert-info text-center">
                    <div class="spinner-border spinner-border-sm me-2" role="status"></div>
                    Analyzing heart disease risk...
                </div>
            `;

            fetch('/predict_heart', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(data)
            })
            .then(response => response.json())
            .then(result => {
                displayHeartResult(result);
            })
            .catch(error => {
                console.error('Error:', error);
                document.getElementById('heartResult').innerHTML = `
                    <div class="alert alert-danger">
                        Error making prediction. Please try again.
                    </div>
                `;
            });
        });

        function displayDiabetesResult(result) {
            let resultHtml = '';

            if (result.error) {
                resultHtml = `
                    <div class="alert alert-danger">
                        ${result.error}
                    </div>
                `;
            } else {
                const riskClass = result.risk_level === 'High Risk' ? 'risk-high' :
                               result.risk_level === 'Medium Risk' ? 'risk-medium' : 'risk-low';

                const riskColor = result.risk_level === 'High Risk' ? 'danger' :
                               result.risk_level === 'Medium Risk' ? 'warning' : 'success';

                resultHtml = `
                    <div class="result-box ${riskClass}">
                        <h4>Diabetes Prediction Result</h4>
                        <p><strong>Prediction:</strong> ${result.prediction === 1 ? '🟢 Diabetes Detected' : '🔵 No Diabetes'}</p>
                        <p><strong>Probability:</strong> ${(result.probability * 100).toFixed(2)}%</p>
                        <p><strong>Risk Level:</strong> <span class="badge bg-${riskColor}">${result.risk_level}</span></p>
                        ${result.recommendation ? `<p><strong>Recommendation:</strong> ${result.recommendation}</p>` : ''}
                    </div>
                `;
            }

            document.getElementById('diabetesResult').innerHTML = resultHtml;
        }

        function displayHeartResult(result) {
            let resultHtml = '';

            if (result.error) {
                resultHtml = `
                    <div class="alert alert-danger">
                        ${result.error}
                    </div>
                `;
            } else {
                const riskClass = result.risk_level === 'High Risk' ? 'risk-high' :
                               result.risk_level === 'Medium Risk' ? 'risk-medium' : 'risk-low';

                const riskColor = result.risk_level === 'High Risk' ? 'danger' :
                               result.risk_level === 'Medium Risk' ? 'warning' : 'success';

                resultHtml = `
                    <div class="result-box ${riskClass}">
                        <h4>Heart Disease Prediction Result</h4>
                        <p><strong>Prediction:</strong> ${result.prediction === 1 ? '🔴 Heart Disease Detected' : '🟢 No Heart Disease'}</p>
                        <p><strong>Probability:</strong> ${(result.probability * 100).toFixed(2)}%</p>
                        <p><strong>Risk Level:</strong> <span class="badge bg-${riskColor}">${result.risk_level}</span></p>
                        ${result.recommendation ? `<p><strong>Recommendation:</strong> ${result.recommendation}</p>` : ''}
                    </div>
                `;
            }

            document.getElementById('heartResult').innerHTML = resultHtml;
        }

        // Add some sample data for testing
        document.addEventListener('DOMContentLoaded', function() {
            // Sample data for diabetes form
            const diabetesSampleData = {
                pregnancies: '2',
                glucose: '120',
                blood_pressure: '70',
                skin_thickness: '20',
                insulin: '79',
                bmi: '25.0',
                dpf: '0.5',
                age: '30'
            };

            // Sample data for heart form
            const heartSampleData = {
                age: '52',
                sex: '1',
                cp: '0',
                trestbps: '125',
                chol: '212',
                fbs: '0',
                restecg: '1',
                thalach: '168',
                exang: '0',
                oldpeak: '1.0',
                slope: '2',
                ca: '2',
                thal: '3'
            };

            // You can pre-fill forms with sample data for testing
            // Uncomment the lines below if you want to pre-fill forms
            /*
            Object.keys(diabetesSampleData).forEach(key => {
                const element = document.querySelector(`[name="${key}"]`);
                if (element) element.value = diabetesSampleData[key];
            });
            */
        });
    </script>
</body>
</html>
